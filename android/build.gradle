apply plugin: 'com.android.library'

android {
    namespace "com.forter.mobile.reactnative"

    compileSdkVersion 33

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.1.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

repositories {
    google()
    mavenCentral()
    maven { url "https://maven.google.com" }
    maven {
        // React Native repository for compilation
        url("$rootDir/../node_modules/react-native/android")
    }
    maven {
        url "https://mobile-sdks.forter.com/android"
        credentials {
            username "forter-android-sdk"
            password "HvYumAfjVQYQFyoGsmNAefGdR84Esqig"
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation 'androidx.annotation:annotation:1.7.0'
    implementation 'com.forter.mobile:fortersdk-releases:3.0.7'
}
